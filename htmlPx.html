<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

.card {
  background: #1a1d2e;
  border-radius: 18px;
  padding: 18px 20px;
  width: 100%;
  max-width: 420px;
  box-shadow: 6px 6px 14px #11131f, -6px -6px 14px #23273d;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  gap: 8px;
}

.badge-status {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 12px;
  border-radius: 20px;
  letter-spacing: 0.04em;
  min-width: 68px;
  text-align: center;
  flex-shrink: 0;
}
.badge-status.online {
  background: #132212;
  color: #4ade80;
  box-shadow: inset 2px 2px 5px #0d1a0d, inset -2px -2px 5px #192e19;
}
.badge-status.offline {
  background: #221212;
  color: #f87171;
  box-shadow: inset 2px 2px 5px #1a0d0d, inset -2px -2px 5px #2e1919;
}

.server-name {
  font-size: 13px;
  font-weight: 600;
  color: #6b7ab5;
  flex: 1;
  text-align: center;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  min-width: 0;
}

.logos {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.logo-box {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  background: #12152a;
  box-shadow: inset 2px 2px 5px #0c0e1e, inset -2px -2px 5px #1a1e38;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}

.logo-box img {
  width: 24px;
  height: 24px;
  object-fit: contain;
}

.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.metric-cell {
  text-align: center;
  background: #1a1d2e;
  border-radius: 14px;
  padding: 14px 4px 10px;
  box-shadow: 4px 4px 9px #11131f, -4px -4px 9px #23273d;
}

.ring-wrap {
  position: relative;
  width: 52px;
  height: 52px;
  margin: 0 auto 8px;
}
.ring-wrap svg {
  transform: rotate(-90deg);
  display: block;
}
.ring-value {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
}

.proc-wrap {
  width: 52px;
  height: 52px;
  margin: 0 auto 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1a1d2e;
  border-radius: 50%;
  box-shadow: 3px 3px 7px #11131f, -3px -3px 7px #23273d;
}
.proc-num {
  font-size: 18px;
  font-weight: 800;
}

.metric-label {
  font-size: 10px;
  color: #3d4466;
  letter-spacing: 0.07em;
  text-transform: uppercase;
}

.ping-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  margin-right: 5px;
  vertical-align: middle;
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.3; }
}
</style>

<div class="card">
  <div class="header">

    <!-- Badge status -->
    <span class="badge-status online" id="ha-status">
      <span class="ping-dot" id="ping-dot" style="background:#4ade80"></span>
      <span id="ha-label">PRX-ON</span>
    </span>

    <!-- Nome do servidor -->
    <span class="server-name" id="server-name">PEADTMTPI2131</span>

    <!-- Logos: cliente + Zabbix -->
    <div class="logos">

      <!-- Logo do cliente (referência) -->
      <div class="logo-box">
        <img
          src="https://verdanatech.com/wp-content/uploads/2024/05/Frame-1.png"
          alt="Cliente"
          onerror="this.style.opacity='0.2';"
        />
      </div>

      <!-- Logo Zabbix -->
      <div class="logo-box">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQo5m3W2MIbUMc5ujiudAAtVJmJtreWBARX4w&s"
          alt="Zabbix"
          onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\'font-size:11px;font-weight:800;color:#f87171;\'>Z</span>';"
        />
      </div>

    </div>
  </div>

  <div class="metrics">

    <!-- CPU -->
    <div class="metric-cell">
      <div class="ring-wrap">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle cx="26" cy="26" r="20" fill="none" stroke="#11131f" stroke-width="6"/>
          <circle id="ring-cpu" cx="26" cy="26" r="20" fill="none"
            stroke="#4ade80" stroke-width="5"
            stroke-dasharray="125.7" stroke-dashoffset="125.7"
            stroke-linecap="round"/>
        </svg>
        <div class="ring-value" id="val-cpu" style="color:#4ade80">—</div>
      </div>
      <div class="metric-label">CPU</div>
    </div>

    <!-- RAM -->
    <div class="metric-cell">
      <div class="ring-wrap">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle cx="26" cy="26" r="20" fill="none" stroke="#11131f" stroke-width="6"/>
          <circle id="ring-ram" cx="26" cy="26" r="20" fill="none"
            stroke="#4ade80" stroke-width="5"
            stroke-dasharray="125.7" stroke-dashoffset="125.7"
            stroke-linecap="round"/>
        </svg>
        <div class="ring-value" id="val-ram" style="color:#4ade80">—</div>
      </div>
      <div class="metric-label">RAM</div>
    </div>

    <!-- Disco -->
    <div class="metric-cell">
      <div class="ring-wrap">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle cx="26" cy="26" r="20" fill="none" stroke="#11131f" stroke-width="6"/>
          <circle id="ring-disk" cx="26" cy="26" r="20" fill="none"
            stroke="#4ade80" stroke-width="5"
            stroke-dasharray="125.7" stroke-dashoffset="125.7"
            stroke-linecap="round"/>
        </svg>
        <div class="ring-value" id="val-disk" style="color:#4ade80">—</div>
      </div>
      <div class="metric-label">DISCO</div>
    </div>

    <!-- Processos -->
    <div class="metric-cell">
      <div class="proc-wrap">
        <span class="proc-num" id="val-proc" style="color:#4ade80">—</span>
      </div>
      <div class="metric-label">PROCES</div>
    </div>

  </div>
</div>
